---
- name: Attach post-install media and enforce disk boot defaults
  hosts: proxmox
  gather_facts: false

  vars:
    windows_vms: "{{ proxmox_windows_original_vms }}"
    linux_vms: "{{ proxmox_linux_original_vms }}"

  tasks:
    - name: Detach installer ISO from originals
      ansible.builtin.command: "qm set {{ item }} --delete ide2"
      loop: "{{ windows_vms + linux_vms }}"
      ignore_errors: true

    - name: Attach Linux bootstrap ISO on ide3
      ansible.builtin.command: >-
        qm set {{ item }}
        --ide3 {{ proxmox_storage_iso }}/{{ proxmox_linux_bootstrap_iso_name }},media=cdrom
      loop: "{{ linux_vms }}"
      when: proxmox_linux_bootstrap_iso_name | length > 0

    - name: Set Linux boot order to scsi0
      ansible.builtin.command: "qm set {{ item }} --boot order=scsi0"
      loop: "{{ linux_vms }}"
      ignore_errors: true

    - name: Set Windows boot order to sata0
      ansible.builtin.command: "qm set {{ item }} --boot order=sata0"
      loop: "{{ windows_vms }}"
      ignore_errors: true

