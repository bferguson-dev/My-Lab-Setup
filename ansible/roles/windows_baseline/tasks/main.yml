---
- name: Ensure lab setup directory exists
  ansible.windows.win_file:
    path: '{{ windows_lab_log_dir }}'
    state: directory

- name: Apply Windows baseline configuration
  ansible.windows.win_powershell:
    script: |
      $ErrorActionPreference = 'Stop'
      $logDir = '{{ windows_lab_log_dir }}'
      New-Item -Path $logDir -ItemType Directory -Force | Out-Null
      $logFile = Join-Path $logDir 'ansible-windows-baseline.log'

      function Write-Log {
        param([string]$Message)
        $line = "[{0}] {1}" -f (Get-Date -Format s), $Message
        $line | Out-File -FilePath $logFile -Append -Encoding utf8
      }

      Write-Log 'Starting Windows baseline configuration'

      if ({{ windows_disable_updates | ternary('$true', '$false') }}) {
        Write-Log 'Disabling Windows automatic updates'
        New-Item -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU' -Force | Out-Null
        Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU' -Name NoAutoUpdate -Type DWord -Value 1
        Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU' -Name AUOptions -Type DWord -Value 1

        foreach ($svc in 'wuauserv','bits','dosvc','UsoSvc') {
          try { Stop-Service $svc -Force -ErrorAction SilentlyContinue } catch {}
          try { Set-Service $svc -StartupType Disabled -ErrorAction SilentlyContinue } catch {}
        }
      }

      if ({{ windows_enable_winrm_lab | ternary('$true', '$false') }}) {
        Write-Log 'Configuring WinRM for lab use'
        winrm quickconfig -q | Out-Null
        winrm set winrm/config/service '@{AllowUnencrypted="false"}' | Out-Null
        winrm set winrm/config/service/auth '@{Basic="false"}' | Out-Null
        Set-Service -Name WinRM -StartupType Automatic
        Start-Service -Name WinRM

        Write-Log 'Adjusting firewall for WinRM'
        netsh advfirewall firewall set rule group="windows remote management" new enable=yes profile=any | Out-Null
      }

      Write-Log 'Capturing verification data'
      Get-Service WinRM,wuauserv,bits,UsoSvc |
        Select-Object Name,Status,StartType |
        Out-File -FilePath (Join-Path $logDir 'service-state.txt') -Encoding utf8

      reg query 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU' /v NoAutoUpdate |
        Out-File -FilePath (Join-Path $logDir 'wu-policy.txt') -Encoding utf8
      winrm enumerate winrm/config/listener |
        Out-File -FilePath (Join-Path $logDir 'winrm-listener.txt') -Encoding utf8

      Write-Log 'Windows baseline configuration complete'

- name: Verify WinRM service is running
  ansible.windows.win_service:
    name: WinRM
    state: started
  when: windows_enable_winrm_lab

- name: Verify updates policy key is present
  ansible.windows.win_reg_stat:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
    name: NoAutoUpdate
  register: windows_baseline_no_auto_update
  when: windows_disable_updates

- name: Assert updates disabled policy set to 1
  ansible.builtin.assert:
    that:
      - windows_baseline_no_auto_update.exists
      - windows_baseline_no_auto_update.value == 1
    fail_msg: Windows update disable policy was not set correctly.
  when: windows_disable_updates
